{% extends "base.html" %}

{% block title %}
    Knowledge Hub - Message Sent
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5 text-center">

                    <h1 class="fw-bold text-success mb-4">
                        Message Sent! 📩
                    </h1>

                    <p class="fs-5 mb-4">
                        Your message has been successfully sent to the Knowledge Hub team.
                    </p>

                    <p class="text-muted mb-4">
                        We usually respond within 24–48 hours. Keep an eye on your inbox!
                    </p>

                    <div class="d-grid gap-3">
                        <a href="/" class="btn btn-primary py-2 fw-bold">
                            Return to Home Page
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
