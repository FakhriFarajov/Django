{% extends "base.html" %}

{% block title %}
    Knowledge Hub - Contact Us
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">

                    <div class="text-center mb-4">
                        <h1 class="fw-bold text-primary">Contact Us</h1>
                        <p class="text-muted">We'd love to hear from you.</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            {{ form.as_p }}
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-3">
                                Send Message
                            </button>
                        </div>
                    </form>

                </div>
            </div>

            <div class="text-center mt-3">
                <a href="/" class="text-secondary text-decoration-none small">
                    &larr; Back to Home
                </a>
            </div>

        </div>
    </div>
</div>
{% endblock %}
