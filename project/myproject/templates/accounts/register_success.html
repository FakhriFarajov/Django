{% extends "base.html" %}

{% block title %}Knowledge Hub - Registration Success{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 col-xl-5">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="card-body p-4 p-md-5 text-center">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-success bg-opacity-10 text-success fw-bold mb-3" style="width: 3rem; height: 3rem;">
                    ✅
                </div>

                <h1 class="h3 fw-bold text-success mb-2">Registration successful</h1>
                <p class="text-muted mb-4">
                    User <strong>{{ username }}</strong> was created successfully.
                </p>

                <div class="d-grid gap-2">
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary py-2 fw-semibold">Go to login</a>
                    <a href="{% url 'notes:home' %}" class="btn btn-outline-secondary">Back to home</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
