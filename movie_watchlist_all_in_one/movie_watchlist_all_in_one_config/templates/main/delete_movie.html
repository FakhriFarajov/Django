{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2>Удалить фильм</h2>
    <p>Вы уверены, что хотите удалить фильм <strong>{{ movie.title }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'my_movies' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
