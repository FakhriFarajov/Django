{% extends "base.html" %}

{% block content %}
<div class="d-flex flex-column align-items-center text-white">

    <!-- Header Section -->
    <div class="text-center mb-5">
        <h1 class="serif-font brand-logo mb-0 text-white">DevStream</h1>
        <div class="brand-subtitle text-white">Intellectual Rigor</div>
    </div>

    <!-- Login Card -->
    <div class="login-card bg-dark text-white">
        <h2 class="serif-font mb-2 text-white">Welcome back</h2>
        <p class="text-white mb-4">Log in to your developer workspace.</p>
        <!-- Form -->
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label small text-uppercase fw-bold text-white" style="font-size: 0.7rem;">Email Address</label>
                <input type="email" class="form-control bg-dark text-white" style="border: 1.5px solid #fff;" placeholder="developer@devstream.io">
            </div>

            <div class="mb-4">
                <div class="d-flex justify-content-between">
                    <label class="form-label small text-uppercase fw-bold text-white" style="font-size: 0.7rem;">Password</label>
                    <a href="#" class="small text-white" style="font-size: 0.75rem;">Forgot password?</a>
                </div>
                <input type="password" class="form-control bg-dark text-white" style="border: 1.5px solid #fff;" placeholder="••••••••">
            </div>

            <button type="submit" class="btn w-100" style="background-color: var(--brand-cyan); color: #fff;">Log In</button>

        </form>

        <p class="text-center mt-4 mb-0 small text-white">
            Don't have an account? <a href="{% url 'account:register' %}" class="text-white">Sign up for free</a>
        </p>
    </div>

    <!-- Status Badge -->
    <div class="mt-5">
        <div class="status-badge text-white">
            <span class="status-dot"></span> SYSTEM STATUS: OPERATIONAL
        </div>
    </div>

</div>
{% endblock %}
