{% extends "base.html" %}

{% block content %}
<div class="container-fluid p-0 overflow-hidden">
    <div class="row g-0 min-vh-100">
        <!-- Right Content Area -->
        <div class="d-flex flex-column justify-content-center align-items-center position-relative bg-dark text-white" style="min-height: 100vh; max-width: 600px; margin: auto; border-radius: 24px; box-shadow: 0 0 32px 0 rgba(0,0,0,0.25);">
            <div class="w-100 d-flex justify-content-center align-items-center" style="min-height: 80vh;">
                <div class="signup-container text-white" style="width: 100%; max-width: 420px;">
                    <h1 class="serif display-4 fw-bold mb-3 text-white">Join DevStream</h1>
                    <p class="text-white mb-5">Create your account to start contributing to the feed.</p>

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label class="form-label text-white">Full Name</label>
                            <input type="text" class="form-control bg-dark text-white" style="border: 1.5px solid #fff;" placeholder="Linus Torvalds">
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-white">Email Address</label>
                            <input type="email" class="form-control bg-dark text-white" style="border: 1.5px solid #fff;" placeholder="you@example.com">
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-white">Password</label>
                            <input type="password" class="form-control bg-dark text-white" style="border: 1.5px solid #fff;" placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn w-100" style="background-color: var(--brand-cyan); color: #fff; border: 1.5px solid #fff;">Create Account</button>
                    </form>

                    <div class="text-center mt-5">
                        <span class="text-white">Already have an account?</span>
                        <a href="{% url 'account:login' %}" class="text-decoration-none ms-1 text-white" style="color: var(--brand-cyan);">Log in</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
