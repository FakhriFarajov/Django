<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevStream | Intellectual Rigor</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Serif for titles, Inter for UI -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #050b16;
            --card-bg: #0d1424;
            --brand-cyan: #65e6fc;
            --text-muted: #8a94a6;
            --border-color: #1e293b;
        }

        body {
            background-color: var(--bg-dark);
            /* Subtle dot pattern */
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .serif-font { font-family: 'Playfair Display', serif; }

        .brand-logo { font-size: 2.5rem; letter-spacing: -1px; }
        .brand-subtitle {
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: var(--brand-cyan);
            text-transform: uppercase;
        }

        .login-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 3rem 2.5rem;
            max-width: 480px;
            width: 100%;
        }

        .form-control {
            background-color: #090e1a;
            border: 1px solid var(--border-color);
            color: white;
            padding: 0.75rem;
        }

        .form-control:focus {
            background-color: #090e1a;
            border-color: var(--brand-cyan);
            box-shadow: 0 0 0 0.25rem rgba(101, 230, 252, 0.25);
            color: white;
        }

        .btn-social {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: white;
            font-weight: 500;
            padding: 0.6rem;
        }

        .btn-social:hover {
            background-color: #161f30;
            color: white;
        }

        .btn-primary-cyan {
            background-color: var(--brand-cyan);
            border: none;
            color: #000;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.8rem;
        }

        .btn-primary-cyan:hover {
            background-color: #4ed5eb;
        }

        .separator {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.7rem;
            letter-spacing: 1px;
            margin: 2rem 0;
        }

        .separator::before, .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .separator:not(:empty)::before { margin-right: 1em; }
        .separator:not(:empty)::after { margin-left: 1em; }

        .status-badge {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            padding: 5px 15px;
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: var(--brand-cyan);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px var(--brand-cyan);
        }

        footer {
            margin-top: auto;
            color: var(--text-muted);
            font-size: 0.8rem;
            padding: 2rem 0;
        }

        a { color: var(--brand-cyan); text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'watchlist:my_movies' %}">My Movies</a>
                        </li>
                        <li class="nav-item">
                            <form method="post" action="{% url 'account:logout' %}" style="display:inline;">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-link nav-link" style="display:inline; padding:0; color:inherit;">Logout</button>
                            </form>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'account:login' %}">Login</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'account:register' %}">Register</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
    <!-- End Navbar -->

    <div class="container py-5">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <div class="container d-flex justify-content-between align-items-center">
            <div>© 2024 DevStream. All rights reserved.</div>
            <div class="d-flex gap-4">
                <a href="#" class="text-muted">Documentation</a>
                <a href="#" class="text-muted">Privacy Policy</a>
                <a href="#" class="text-muted">Terms of Service</a>
            </div>
        </div>
    </footer>

</body>
</html>
